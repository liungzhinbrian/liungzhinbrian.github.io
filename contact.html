<link rel="icon" type="image/png" href="image/favicon.png">

<style>
  :root {
    --paper: #F6F2E7;
    --paper-deep: #EDE7D6;
    --ink: #211E19;
    --ink-light: #6E6659;
    --cinnabar: #A8382A;
    --rule: #D8D0BC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif TC', 'Songti TC', 'PMingLiU', 'PMingLiU-ExtB', '新細明體-ExtB', serif;
    line-height: 1.9;
    font-size: 18px;
  }
  .frame { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

  header {
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    position: sticky; top: 0; z-index: 10;
  }
  .header-inner {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 18px 0 14px; flex-wrap: wrap; gap: 8px 24px;
  }
  .site-name { font-size: 19px; font-weight: 900; letter-spacing: .14em; }
  .site-name .en {
    font-size: 11.5px; font-weight: 400;
    color: var(--ink-light);
    letter-spacing: .3em;
    margin-left: 10px;
  }
  .site-name a { color: var(--ink); text-decoration: none; }
  .site-name .seal-dot {
    display: inline-block; width: 10px; height: 10px;
    background: var(--cinnabar); margin-left: 10px;
    transform: translateY(-2px) rotate(45deg);
  }
  nav.main-nav ul { display: flex; gap: 26px; list-style: none; flex-wrap: wrap; }
  nav.main-nav a {
    color: var(--ink); text-decoration: none;
    font-size: 16.5px; letter-spacing: .12em;
    padding-bottom: 3px; border-bottom: 2px solid transparent;
    transition: border-color .2s;
  }
  nav.main-nav a:hover, nav.main-nav a:focus-visible { border-bottom-color: var(--cinnabar); outline: none; }
  nav.main-nav a.current { border-bottom-color: var(--cinnabar); color: var(--cinnabar); }

  .page-head { padding: 64px 0 40px; border-bottom: 1px solid var(--rule); }
  .page-head h1 {
    font-size: clamp(30px, 5vw, 42px);
    font-weight: 900; letter-spacing: .3em;
  }
  .wave-mark {
    height: 26px; width: auto;
    margin-right: 16px;
    vertical-align: -3px;
  }
  .page-head .page-sub {
    color: var(--ink-light); font-size: 14px;
    letter-spacing: .15em; margin-top: 6px;
  }

  .contact-table { padding: 44px 0 8px; }
  .contact-row {
    display: grid;
    grid-template-columns: 170px 1fr;
    gap: 24px;
    padding: 22px 6px;
    border-bottom: 1px dashed var(--rule);
  }
  .contact-row:first-child { border-top: 1px solid var(--rule); }
  .contact-row dt {
    color: var(--ink-light);
    font-size: 16px;
    letter-spacing: .15em;
  }
  .contact-row dd { font-size: 18px; }
  .contact-row dd .note {
    display: block;
    font-size: 14.5px;
    color: var(--ink-light);
    margin-top: 6px;
  }
  .contact-row a { color: var(--cinnabar); text-decoration: none; }
  .contact-row a:hover { text-decoration: underline; }
  .mail-line { display: block; padding: 2px 0; }

  footer {
    padding: 44px 0 56px;
    color: var(--ink-light);
    font-size: 14px; letter-spacing: .06em;
    border-top: 1px solid var(--rule);
    margin-top: 48px;
  }
  footer .wave-foot {
    height: 22px; width: auto;
    opacity: .45;
    display: block;
    margin-bottom: 14px;
  }
  footer a { color: var(--ink-light); }

  @media (max-width: 640px) {
    nav.main-nav ul { gap: 16px; }
    .contact-row { grid-template-columns: 1fr; gap: 4px; }
  }
</style>
</head>
